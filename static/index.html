<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="ParLevel — Know what you have, what's low, and what to order. By shavi labs.">
  <meta name="theme-color" content="#0a0a0a">
  <script>
    (function(){try{var th=localStorage.getItem('parlevel_theme')||'system';var d=th==='dark'||(th==='system'&&matchMedia('(prefers-color-scheme:dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>ParLevel</title>
  <link rel="manifest" href="/static/manifest.json">
  <link rel="icon" href="/static/logo.jfif" type="image/jpeg">
  <link rel="apple-touch-icon" href="/static/logo.jfif">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>

  <div id="app">
    <header class="topbar" id="topbar" hidden>
      <div class="topbar-inner">
        <div class="brand">
          <img src="/static/logo.jfif" alt="" class="brand-logo" width="32" height="32">
          <div>
            <strong>ParLevel</strong>
            <span class="brand-sub" id="business-name"></span>
          </div>
        </div>
        <nav class="nav nav-desktop" id="nav"></nav>
        <button type="button" class="topbar-settings-btn no-print" id="topbar-settings" hidden aria-label="Settings">⚙</button>
      </div>
    </header>

    <main id="main"></main>

    <nav class="bottom-nav no-print" id="bottom-nav" hidden></nav>

    <footer class="app-footer no-print" id="app-footer" hidden>
      <span>ParLevel by <a href="https://splendorous-lollipop-8cfbad.netlify.app/" target="_blank" rel="noopener">shavi labs</a></span>
      <span class="footer-legal"><a href="/privacy">Privacy</a> · <a href="/terms">Terms</a></span>
    </footer>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-panel" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="icon-btn" data-close aria-label="Close">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <div class="toast-stack" id="toasts" aria-live="polite"></div>
  <div class="loader" id="loader" hidden><div class="loader-ring"></div></div>

  <div class="install-banner no-print" id="install-banner" hidden>
    <span>Install ParLevel on your phone for quick access</span>
    <button class="btn btn-primary btn-sm" id="install-btn">Install</button>
    <button class="icon-btn" id="install-dismiss" aria-label="Dismiss">&times;</button>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
